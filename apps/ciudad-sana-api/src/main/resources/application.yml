spring:
  application:
    name: ciudad-sana-api
  profiles:
    active: ${APP_PROFILE:local}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ciudad_sana}
    username: ${DB_USERNAME:ciudadsana}
    password: ${DB_PASSWORD:ciudadsana}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  security:
    filter:
      order: 10

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha

app:
  security:
    jwt:
      secret: ${JWT_SECRET:must-be-at-least-256-bits-secret-key-for-hmac-sha}
      expiration-ms: ${JWT_EXPIRATION_MS:3600000}
      refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  optimization:
    service-url: ${OPTIMIZATION_SERVICE_URL:http://localhost:8000}
    timeout-seconds: ${OPTIMIZATION_TIMEOUT_SECONDS:35}
  osrm:
    service-url: ${OSRM_SERVICE_URL:http://router.project-osrm.org}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
