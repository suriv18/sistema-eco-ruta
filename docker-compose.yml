services:

  # ─── PostgreSQL + PostGIS ─────────────────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: ciudad-sana-db
    restart: unless-stopped
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ciudad_sana}
      POSTGRES_USER: ${POSTGRES_USER:-ciudadsana}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ciudadsana}
    volumes:
      - ciudad_sana_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ciudadsana} -d ${POSTGRES_DB:-ciudad_sana}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ciudad-sana-net

  # ─── Spring Boot Backend ──────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: apps/ciudad-sana-api/Dockerfile
    image: ciudad-sana-api:latest
    container_name: ciudad-sana-api
    restart: unless-stopped
    ports:
      - "18080:18080"
    environment:
      SERVER_PORT: 18080
      APP_PROFILE: docker
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-ciudad_sana}
      DB_USERNAME: ${POSTGRES_USER:-ciudadsana}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-ciudadsana}
      JWT_SECRET: ${JWT_SECRET:-must-be-at-least-256-bits-secret-key-for-hmac-sha}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-604800000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      OPTIMIZATION_SERVICE_URL: ${OPTIMIZATION_SERVICE_URL:-http://service-optimization:8000}
      OSRM_SERVICE_URL: ${OSRM_SERVICE_URL:-http://osrm:5000}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ciudad-sana-net

  # ─── Servicio de Optimización (Python / FastAPI / OR-Tools) ──────────────
  service-optimization:
    image: ciudad-sana-optimizer:latest
    container_name: ciudad-sana-optimizer
    build:
      context: ./service-optimization
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      OSRM_URL: http://osrm:5000
    networks:
      - ciudad-sana-net

  # ─── OSRM (Open Source Routing Machine) ──────────────────────────────────
  osrm:
    image: ghcr.io/project-osrm/osrm-backend:v5.27.1
    container_name: ciudad-sana-osrm
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - osrm_data:/data
    command: osrm-routed --algorithm mld /data/lima.osrm
    networks:
      - ciudad-sana-net

volumes:
  ciudad_sana_pgdata:
    name: ciudad_sana_pgdata
  osrm_data:
    name: ciudad_sana_osrm_data

networks:
  ciudad-sana-net:
    name: ciudad-sana-net
    driver: bridge
